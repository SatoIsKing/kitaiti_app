<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スロット期待値・神託アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { background-color: #6200ea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #3700b3; }
        #resultText { margin-top: 20px; padding: 15px; background: #e3f2fd; border-radius: 5px; min-height: 50px; white-space: pre-wrap; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>スロット期待値分析</h1>
    <p>履歴データを貼り付けてくださいませー</p>
    
    <textarea id="inputData" placeholder="例：
100G BB
250G RB
50G ヤメ"></textarea>
    
    <br>
    
    <button onclick="analyzeData()">神託を仰ぐ</button>

    <div id="resultText">ここに分析結果が表示されます……。</div>
</div>

<script src="kitaiti.js"></script>

</body>
</html>
